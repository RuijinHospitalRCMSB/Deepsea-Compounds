<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Target Detail — Deep-Sea Compound Database</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --primary: #0077b6;
  --primary-hover: #005f8c;
  --primary-light: rgba(0,119,182,0.08);
  --bg-page: #f5f0f8;
  --bg-content: #ffffff;
  --bg-card: #faf8fc;
  --border: #dde4ec;
  --border-light: #e8edf4;
  --text-primary: #0d1b2a;
  --text-secondary: #455a64;
  --text-muted: #78909c;
  --shadow-sm: 0 1px 3px rgba(13,27,42,0.06);
  --shadow-md: 0 4px 12px rgba(13,27,42,0.08);
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --font-sans: 'Noto Sans SC', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --font-display: 'Playfair Display', serif;
}
body { font-family:var(--font-sans); background:var(--bg-page); color:var(--text-primary); line-height:1.65; min-height:100vh; -webkit-font-smoothing:antialiased; display:flex; }

/* SIDEBAR */
.side-nav { position:fixed; top:0; left:0; width:200px; height:100vh; background:var(--bg-content); border-right:1px solid var(--border); padding:28px 0; overflow-y:auto; z-index:100; display:flex; flex-direction:column; }
.nav-header { padding:0 20px 20px; border-bottom:1px solid var(--border); margin-bottom:4px; }
.nav-title { font-size:15px; font-weight:600; color:var(--text-primary); line-height:1.3; }
.nav-title em { color:var(--primary); font-style:normal; }
.nav-sub { font-size:12px; color:var(--text-muted); margin-top:3px; }
.nav-items { list-style:none; padding:0; margin:0; flex:1; }
.nav-items li a { display:flex; align-items:center; gap:10px; padding:9px 20px; color:var(--text-secondary); text-decoration:none; font-size:13px; transition:all 0.15s; border-left:2px solid transparent; }
.nav-items li a:hover { color:var(--text-primary); background:var(--bg-card); }
.nav-items li a.active { color:var(--primary); border-left-color:var(--primary); background:var(--primary-light); font-weight:500; }
.nav-dot { width:5px; height:5px; border-radius:50%; background:currentColor; opacity:0.35; flex-shrink:0; }
.nav-footer { padding:12px 20px; border-top:1px solid var(--border); font-size:11px; color:var(--text-muted); margin-top:auto; text-align:center; }

/* MAIN */
.main-content { margin-left:200px; flex:1; min-width:0; background:var(--bg-page); min-height:100vh; }

/* Detail page */
#target-detail { max-width:1100px; padding:20px 28px 60px; }
.detail-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);text-decoration:none;margin-bottom:16px;transition:color .15s}
.detail-back:hover{color:var(--primary)}

/* ── Hero horizontal layout ── */
.target-hero{background:linear-gradient(135deg,#fce4ec 0%,#f3e5f5 40%,#f0f4f8 100%);border:1px solid var(--border);border-radius:12px;padding:0;margin-bottom:20px;position:relative;overflow:hidden}
.target-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 400px 200px at 15% 30%,rgba(229,57,53,0.03) 0%,transparent 70%),radial-gradient(ellipse 300px 200px at 80% 20%,rgba(142,36,170,0.02) 0%,transparent 70%);pointer-events:none}
.hero-body{display:flex;gap:0;min-height:130px;position:relative;z-index:1}
.hero-left{flex:1;padding:28px 32px;display:flex;flex-direction:column;justify-content:center}
.hero-right{width:400px;flex-shrink:0;padding:20px 6px 20px 10px;display:flex;align-items:center}
.hero-stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;width:100%}
.hero-stat{background:rgba(255,255,255,0.7);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.5);border-radius:6px;padding:6px 4px;text-align:center;min-width:0}
.hero-stat-label{font-size:8px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;white-space:nowrap}
.hero-stat-value{font-size:14px;font-weight:700;color:var(--text-primary);line-height:1.3;word-break:break-all;max-width:100%}
.hero-stat-value a{color:var(--primary);text-decoration:none}
.hero-stat-value a:hover{text-decoration:underline}
.hero-stat-sub{font-size:10px;color:var(--text-muted);margin-top:1px}
.target-hero-tags{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.target-hero-cat{display:inline-block;padding:3px 10px;border-radius:5px;font-size:12px;font-weight:600;letter-spacing:.3px}
.target-hero-gene{display:inline-block;padding:3px 10px;border-radius:5px;background:rgba(13,27,42,0.06);color:var(--text-secondary);font-family:var(--font-mono);font-size:12px;font-weight:500}
.target-hero-title{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--text-primary);margin:0;line-height:1.25}

/* ── Section styles ── */
.detail-section{margin-bottom:28px}
.detail-section-title{font-size:15px;font-weight:700;color:var(--text-primary);margin:0 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:8px}
.section-count{font-size:12px;background:var(--primary-light);color:var(--primary);padding:1px 8px;border-radius:6px;font-weight:600}
.detail-section{margin-bottom:28px}
.detail-section-title{font-size:15px;font-weight:700;color:var(--text-primary);margin:0 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:8px}
.section-count{font-size:12px;background:var(--primary-light);color:var(--primary);padding:1px 8px;border-radius:6px;font-weight:600}
.ext-links-row{display:flex;gap:6px;flex-wrap:wrap}
.ext-link-pill{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid var(--border);border-radius:8px;font-size:12px;color:var(--text-secondary);text-decoration:none;transition:all .15s;background:var(--bg-content);white-space:nowrap}
.ext-link-pill:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.ext-link-icon{font-size:13px}
.function-text{font-size:14px;line-height:1.7;color:var(--text-secondary);margin:0 0 8px}
.function-source{font-size:12px;color:var(--text-muted)}
.function-source a{color:var(--primary);text-decoration:none}
/* ── Disease Association ── */
.disease-container{display:flex;flex-direction:column;gap:10px}
.disease-block{display:flex;flex-direction:column;gap:4px}
.disease-block-label{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.3px}
.disease-tags{display:flex;flex-wrap:wrap;gap:5px}
.disease-tag{display:inline-block;padding:4px 10px;background:var(--primary-light);color:var(--primary);border-radius:5px;font-size:12px;font-weight:500;transition:all .12s}
.disease-tag:hover{background:var(--primary);color:#fff}
.disease-drug-status{display:flex;align-items:center;flex-wrap:wrap;gap:4px}
.drug-status-badge{display:inline-block;padding:3px 10px;border-radius:5px;font-size:12px;font-weight:700;letter-spacing:.4px;border:1px solid;text-transform:uppercase}
.drug-name-pill{display:inline-block;padding:2px 8px;background:var(--bg-card);border:1px solid var(--border-light);border-radius:4px;font-size:11px;font-weight:500;color:var(--text-secondary);margin:1px 0}
.kegg-list{display:flex;flex-direction:column;gap:6px}
.kegg-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border:1px solid var(--border-light);border-radius:7px;text-decoration:none;transition:all .15s;background:var(--bg-content)}
.kegg-item:hover{border-color:var(--primary);background:var(--primary-light)}
.kegg-id{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--text-muted);min-width:80px}
.kegg-name{flex:1;font-size:13px;color:var(--text-primary)}
.kegg-arrow{font-size:14px;color:var(--text-muted)}
.kegg-item:hover .kegg-arrow{color:var(--primary)}
.potency-tabs{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.potency-tab{padding:5px 14px;border:1px solid var(--border);border-radius:6px;background:var(--bg-content);color:var(--text-secondary);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.potency-tab:hover{border-color:var(--primary);color:var(--primary)}
.potency-tab.active{background:var(--primary);color:#fff;border-color:var(--primary)}
/* ── Compounds table ── */
.cpd-table{width:100%;border-collapse:collapse;font-size:13px;background:var(--bg-content);border-radius:var(--radius-md);overflow:hidden;border:1px solid var(--border-light)}
.cpd-table thead{background:var(--bg-card);border-bottom:1px solid var(--border)}
.cpd-table th{text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
.cpd-table td{padding:9px 12px;border-bottom:1px solid var(--border-light);vertical-align:middle}
.cpd-table tbody tr{transition:background .12s;cursor:pointer}
.cpd-table tbody tr:hover{background:var(--primary-light)}
.cpd-table tbody tr:last-child td{border-bottom:none}
.cpd-td-img{width:42px;text-align:center}
.cpd-td-img img{width:32px;height:32px;border-radius:4px;object-fit:contain;background:#f8fafc;display:block;margin:0 auto}
.cpd-td-img .fallback{font-size:16px;color:var(--text-muted);opacity:.4}
.cpd-td-name{font-weight:600;color:var(--text-primary);text-decoration:none}
.cpd-td-name:hover{color:var(--primary)}
.cpd-td-activity{color:var(--text-secondary);font-family:var(--font-mono);font-size:12px;white-space:nowrap}
.cpd-td-pmid{color:var(--primary);text-decoration:none;font-weight:500;font-size:12px;white-space:nowrap}
.cpd-td-potency{font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--text-primary);white-space:nowrap}
.cpd-td-formula{font-family:var(--font-mono);font-size:12px;color:var(--text-secondary)}
.cpd-td-mw{font-family:var(--font-mono);font-size:12px;color:var(--text-secondary);white-space:nowrap}
.cpd-td-chembl{font-size:12px;color:var(--text-secondary)}
.cpd-td-chemotype{font-size:12px;color:var(--text-secondary)}
.cpd-td-sub{font-size:11px;color:var(--text-muted);display:block}
.sortable-th{cursor:pointer;user-select:none}
.sortable-th:hover{color:var(--primary)}
.sort-arrow{font-size:9px;margin-left:3px;opacity:.5}
.sortable-th:hover .sort-arrow{opacity:1}
</style>
</head>
