.ref-year-section{margin-bottom:24px}

.ref-list{list-style:none;padding:0;margin:0}
.ref-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-light);transition:background .1s}
.ref-item:hover{background:var(--bg-card);margin:0 -10px;padding:8px 10px;border-radius:var(--radius-sm)}

.ref-links{display:inline;white-space:nowrap;margin-left:4px}

    var pct = (count / maxCount) * 100;
    var barColor = 'hsl(' + Math.round(190 + (pct/100)*50) + ',60%,50%)';
    trendHtml += '<div class="trend-bar" style="height:' + Math.max(3, pct) + '%;background:' + barColor + '" title="' + y + ': ' + count + ' refs"></div>';
  });
  trendHtml += '</div>';
  trendHtml += '<div class="trend-legend">';
  trendHtml += '<span>📈 From ' + yearOrder[0] + ' to ' + (yearOrder[yearOrder.length-1] || yearOrder[0]) + '</span>';
  trendHtml += '<span>Peak: 2020 (37 refs)</span>';
  trendHtml += '</div>';
  document.getElementById('trend-chart').innerHTML = trendHtml;

  // ── Year jump ──
  var jumpHtml = '';
  yearOrder.forEach(function(y){
    var label = y === 'unknown' ? 'Other' : y;
    jumpHtml += '<a href="#year-' + y + '">' + label + '</a>';
  });
  document.getElementById('year-jump').innerHTML = jumpHtml;

  // ── Render ──
  var container = document.getElementById('refs-container');
  var html = '';
  var globalIdx = 1;

  yearOrder.forEach(function(y){
    var items = yearMap[y];
    var label = y === 'unknown' ? 'Other / Unknown Year' : y;
    html += '<div class="ref-year-section">';
    html += '  <h2 class="ref-year-heading" id="year-' + y + '">' + label + ' <span class="ref-year-count">' + items.length + ' refs</span></h2>';
    html += '  <ul class="ref-list">';
    items.forEach(function(r){
      var links = '';
      if (r.p) links += '<a href="https://pubmed.ncbi.nlm.nih.gov/' + r.p + '/" target="_blank" class="ref-link-pmid">[PMID:' + r.p + ' \u2197]</a>';
      if (r.d) links += '<a href="https://doi.org/' + r.d + '" target="_blank" class="ref-link-doi">DOI\uff1a' + r.d + ' \u2197</a>';
      html += '    <li class="ref-item">';
      html += '      <span class="ref-num">[' + globalIdx + ']</span>';
      html += '      <span class="ref-text">' + r.t;
      if (links) html += ' <span class="ref-links">' + links + '</span>';
      html += '      </span>';
      html += '    </li>';
      globalIdx++;
    });
    html += '  </ul>';
    html += '</div>';
  });

  container.innerHTML = html;

})();
</script>
