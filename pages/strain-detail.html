<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--primary:#0077b6;--primary-hover:#005f8c;--primary-light:rgba(0,119,182,0.08);--bg-page:#f0f4f8;--bg-content:#ffffff;--bg-card:#f8fafc;--border:#dde4ec;--border-light:#e8edf4;--text-primary:#0d1b2a;--text-secondary:#455a64;--text-muted:#78909c;--shadow-sm:0 1px 3px rgba(13,27,42,0.06);--shadow-md:0 4px 12px rgba(13,27,42,0.08);--shadow-lg:0 8px 24px rgba(13,27,42,0.12);--radius-sm:6px;--radius-md:8px;--radius-lg:12px;--font-sans:'Noto Sans SC',-apple-system,sans-serif;--font-mono:'JetBrains Mono',monospace;}
body{background:var(--bg-page);font-family:var(--font-sans);color:var(--text-primary);}
.global-sidebar{position:fixed;top:0;left:0;width:180px;height:100vh;background:#0d1b2a;color:#fff;overflow-y:auto;z-index:100;display:flex;flex-direction:column;}
.sidebar-header{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;gap:10px;}
.sidebar-logo{font-size:22px;}.sidebar-title{font-size:13px;font-weight:700;color:#fff;margin:0;}
.sidebar-nav{list-style:none;padding:6px 0;margin:0;flex:1;}
.sidebar-nav li{margin:0;}
.sidebar-nav li a{display:flex;align-items:flex-start;gap:8px;padding:9px 16px;font-size:12px;color:#90caf9;cursor:pointer;text-decoration:none;border-left:2px solid transparent;transition:all 0.12s;}
.sidebar-nav li a:hover{background:rgba(255,255,255,0.04);color:#fff;}
.sidebar-nav li.active a{background:rgba(21,101,192,0.25);color:#fff;border-left-color:#42a5f5;}
.nav-label .nav-en{display:inline;}.nav-label .nav-zh{display:none;}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:space-between;}
.theme-btn{background:none;border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);font-size:14px;padding:4px 8px;border-radius:4px;cursor:pointer;}
.sidebar-ver{font-size:10px;color:rgba(255,255,255,0.3);}
.global-main{margin-left:180px;min-height:100vh;background:var(--bg-page);position:relative;}
.global-topbar{display:flex;align-items:center;gap:12px;padding:10px 12px;background:var(--bg-content);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.nav-toggle-btn{background:none;border:none;font-size:18px;cursor:pointer;color:var(--text-secondary);padding:4px;}
.page-content{padding:20px 12px 40px;}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--text-muted);text-decoration:none;font-size:12px;margin-bottom:16px;transition:color 0.15s;}
.back-link:hover{color:var(--primary);}
.loading-state,.error-state{text-align:center;padding:60px 20px;color:var(--text-muted);font-size:14px;}
.detail-hero{display:flex;flex-direction:column;gap:8px;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:16px;}
.detail-hero-title{font-size:24px;font-weight:700;color:var(--text-primary);margin:0;line-height:1.3;}
.detail-hero-title i{font-style:italic;}
.hero-badges{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.hero-badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:4px;font-weight:600;}
.hero-badge.genus{background:var(--primary-light);color:var(--primary);}
.hero-badge.depth{color:#fff;}
.info-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.info-card{background:var(--bg-content);border:1px solid var(--border);border-radius:var(--radius-md);padding:10px 12px;text-align:center;box-shadow:var(--shadow-sm);}
.info-card-icon{font-size:18px;margin-bottom:2px;}
.info-card-label{font-size:9px;text-transform:uppercase;color:var(--text-muted);letter-spacing:0.04em;font-weight:600;}
.info-card-value{font-size:13px;color:var(--text-primary);font-weight:500;margin-top:2px;word-break:break-word;}
.taxonomy-bar{display:flex;flex-wrap:wrap;gap:3px;align-items:center;margin-bottom:16px;}
.tax-item{display:flex;align-items:center;gap:4px;padding:3px 10px;background:var(--bg-content);border:1px solid var(--border);border-radius:4px;font-size:11px;}
.tax-rank{color:var(--text-muted);font-size:9px;text-transform:uppercase;letter-spacing:0.03em;}
.tax-name{color:var(--text-primary);font-weight:500;}
.section{margin-bottom:20px;}
.section-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.section-header h2{font-size:16px;font-weight:700;color:var(--text-primary);margin:0;}
.section-line{flex:1;height:1px;background:var(--border);}
.ctags{display:flex;flex-wrap:wrap;gap:6px;}
.ctag{display:inline-block;padding:4px 12px;border-radius:12px;font-size:12px;font-weight:600;}
.depth-dot{width:10px;height:10px;border-radius:50%;display:inline-block;}
.strain-sort-bar{display:flex;align-items:center;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.strain-sort-label{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:.3px;}
.strain-sort-btn{padding:4px 11px;border:1px solid var(--border);border-radius:5px;background:var(--bg-content);color:var(--text-secondary);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit;line-height:1.4;}
.strain-sort-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light);}
.strain-sort-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.strain-sort-btn .ssa{font-size:8px;margin-left:2px;line-height:1;}
.cpd-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.cpd-card{display:flex;gap:8px;padding:8px 10px;border:1px solid var(--border);border-radius:var(--radius-md);background:var(--bg-content);text-decoration:none;transition:all 0.15s;box-shadow:var(--shadow-sm);align-items:center;}
.cpd-card:hover{border-color:var(--primary);box-shadow:var(--shadow-md);}
.cpd-img{width:32px;height:32px;border-radius:4px;border:1px solid var(--border-light);background:var(--bg-card);flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.cpd-img img{width:100%;height:100%;object-fit:contain;}
.cpd-img-fallback{font-size:12px;color:var(--text-muted);}
.cpd-info{flex:1;min-width:0;line-height:1.2;}
.cpd-name{font-size:12px;font-weight:600;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cpd-formula{font-size:10px;color:var(--text-muted);margin-top:1px;}
.cpd-tags{display:flex;gap:3px;flex-shrink:0;align-items:center;}
.cpd-ct{font-size:8px;padding:1px 6px;border-radius:8px;font-weight:600;white-space:nowrap;}
.cpd-cid{font-size:9px;color:var(--text-muted);font-family:var(--font-mono);}
@media(max-width:800px){.cpd-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:500px){.cpd-grid{grid-template-columns:1fr;}}
.ext-links{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;max-width:100%;}
.ext-link{display:flex;flex-direction:column;gap:4px;padding:14px 16px;background:var(--bg-content);border:1px solid var(--border);border-radius:var(--radius-lg);text-decoration:none;transition:all 0.2s;box-shadow:var(--shadow-sm);}
.ext-link:hover{border-color:var(--primary);box-shadow:var(--shadow-md);transform:translateY(-1px);}
.ext-link-icon{font-size:24px;line-height:1;}
.ext-link-title{font-size:14px;font-weight:600;color:var(--text-primary);}
.ext-link-desc{font-size:11px;color:var(--text-muted);line-height:1.3;}
.ext-link-id{display:inline-flex;align-items:center;gap:5px;margin-top:2px;font-family:var(--font-mono);font-size:12px;font-weight:500;color:var(--primary);background:var(--primary-light);padding:3px 10px;border-radius:6px;width:fit-content;}
.ext-link:hover .ext-link-id{background:var(--primary);color:#fff;}
.details-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.detail-card{background:var(--bg-content);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px;box-shadow:var(--shadow-sm);}
.detail-card h4{font-size:12px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:0.04em;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.detail-card h4 span{font-size:14px;}
.dtl-row{display:flex;padding:4px 0;border-bottom:1px solid var(--border-light);font-size:12px;line-height:1.6;}
.dtl-row:last-child{border-bottom:none;}
.dtl-label{color:var(--text-muted);min-width:120px;flex-shrink:0;font-size:11px;}
.dtl-value{color:var(--text-primary);font-weight:500;flex:1;}
.dtl-value.mono{font-family:var(--font-mono);font-size:11px;}
.dtl-value i{font-style:italic;}
.dtl-badge{display:inline-block;background:var(--primary-light);color:var(--primary);font-family:var(--font-mono);font-size:11px;padding:1px 8px;border-radius:4px;font-weight:600;}
@media(max-width:900px){.info-row{grid-template-columns:repeat(3,1fr);}.ext-links{grid-template-columns:1fr 1fr;}.details-grid{grid-template-columns:1fr;}.page-content{padding:16px;}}
@media(max-width:600px){.global-sidebar{display:none;}.global-main{margin-left:0;}.info-row{grid-template-columns:repeat(2,1fr);}.ext-links{grid-template-columns:1fr;}.page-content{padding:12px;}.detail-hero-title{font-size:20px;}}
</style>
</head>

var container=document.getElementById('strainDetail');

else if(!window.STRAINS_DETAIL){container.innerHTML='<div class="error-state">Data not loaded. <a href="browse-strains.html" style="color:var(--primary)">Browse strains</a></div>';}

function renderDetail(s){

var tx=gb?gb.taxId:'';

h+='</div></div>';
if(gb){

h+='<div class="detail-card"><h4><span>📖</span> Submission &amp; Reference</h4>';
h+='<div class="dtl-row"><span class="dtl-label">Title</span><span class="dtl-value" style="font-size:11px;font-style:italic;">'+esc(gb.paperTitle)+' <a href="https://scholar.google.com/scholar?q='+gq+'" target="_blank" rel="noopener" style="font-size:10px;color:var(--primary);text-decoration:none;white-space:nowrap;">Scholar↗</a></span></div>';
h+='<div class="dtl-row"><span class="dtl-label">Authors</span><span class="dtl-value">'+esc(gb.authors)+'</span></div>';
h+='<div class="dtl-row"><span class="dtl-label">Institution</span><span class="dtl-value" style="font-size:11px;">'+esc(gb.institution)+'</span></div>';
h+='<div class="dtl-row"><span class="dtl-label">Submitted</span><span class="dtl-value">'+esc(gb.submitted)+'</span></div>';
h+='<div class="dtl-row"><span class="dtl-label">Sequencing</span><span class="dtl-value">Sanger dideoxy sequencing</span></div></div></div></div>';}
if(s.c&&s.c.length>0){h+='<div class="section"><div class="section-header"><h2>🧪 Chemotypes · 化学类型</h2><div class="section-line"></div></div><div class="ctags">';s.c.forEach(function(ct){var cc=ctColor(ct);h+='<span class="ctag" style="background:'+cc+'18;color:'+cc+';border:1px solid '+cc+'30;">'+esc(ct)+'</span>';});h+='</div></div>';}
var ca=(s.cp||[]).slice().sort(function(a,b){return a.n.localeCompare(b.n);}),cn=s.n||ca.length;
var strainc_sf='name',strainc_sd=1;
function strainc_sc(a,b){
	var va,vb;
	if(strainc_sf==='name'){va=a.n.toUpperCase();vb=b.n.toUpperCase();return strainc_sd*va.localeCompare(vb);}
	if(strainc_sf==='formula'){va=(a.f||'').toUpperCase();vb=(b.f||'').toUpperCase();return strainc_sd*va.localeCompare(vb);}
	if(strainc_sf==='mw'){va=parseFloat(a.m)||0;vb=parseFloat(b.m)||0;return strainc_sd*(va-vb);}
	if(strainc_sf==='chemotype'){va=(a.y||'').toUpperCase();vb=(b.y||'').toUpperCase();return strainc_sd*va.localeCompare(vb);}
	return 0;
}
function strainc_render(){
	ca=(s.cp||[]).slice().sort(strainc_sc);
	var grid=document.getElementById('strain-cpd-grid');
	if(!grid)return;
	grid.innerHTML='';
	ca.forEach(function(c){grid.innerHTML+=renderCpdCard(c);});
	document.querySelectorAll('.strain-sort-btn').forEach(function(b){b.classList.toggle('active',b.dataset.sort===strainc_sf);var a=b.querySelector('.ssa');if(a)a.textContent=b.classList.contains('active')?(strainc_sd===1?'▲':'▼'):'';});
}
h+='<div class="section"><div class="section-header"><h2>🧪 Associated Compounds · 相关化合物 ('+cn+')</h2><div class="section-line"></div></div>';

h+='  <button class="strain-sort-btn" data-sort="mw">MW <span class="ssa"></span></button>';
h+='  <button class="strain-sort-btn" data-sort="chemotype">Chemotype <span class="ssa"></span></button>';
h+='</div>';
h+='<div class="cpd-grid" id="strain-cpd-grid">';
ca.forEach(function(c){h+=renderCpdCard(c);});h+='</div></div>';
strainSortHandler();container.innerHTML=h;

function renderCpdCard(c){
var im=imgUrl(c.i,'s'),cc=ctColor(c.y),dc=depColor(c.dp);
var a='<a href="../1-Compounds/'+c.l+'" class="cpd-card" title="'+esc(c.n)+' \u00b7 '+(c.f||'')+(c.m?' \u00b7 MW '+c.m:'')+'">';
a+='<div class="cpd-img">'+(im?'<img src="'+im+'" alt="" loading="lazy">':'<span class="cpd-img-fallback">?</span>')+'</div>';
a+='<div class="cpd-info"><div class="cpd-name">'+esc(c.n)+'</div>';
a+='<div class="cpd-formula">'+(c.f||'')+(c.m?' \u00b7 MW '+c.m:'')+'</div></div>';
a+='<div class="cpd-tags"><span class="cpd-ct" style="background:'+cc+'18;color:'+cc+'">'+esc(c.y||'')+'</span>';
a+='</div></a>';
return a;
}
